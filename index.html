<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyRadio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0d0d0f;
        --surface: #16161a;
        --border: #2a2a32;
        --amber: #e8a838;
        --amber-dim: #9a6e1f;
        --text: #e8e4da;
        --muted: #6b6870;
        --blue: #4a9eff;
        --blue-dim: #1e4a80;
        --player-h: 80px;
        --header-clock-color: #ffffff;
      }

      :root.light {
        --bg: #f5f0e8;
        --surface: #ede8e0;
        --border: #d4cfc6;
        --amber: #c8861a;
        --amber-dim: #a06010;
        --text: #1a1814;
        --muted: #7a7470;
        --blue: #1a6ecc;
        --blue-dim: #0a3d80;
        --header-clock-color: #1a1814;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-weight: 300;
        transition: background 0.3s, color 0.3s;
      }

      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      header {
        position: sticky; top: 0; z-index: 10;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        padding: 20px 32px 16px;
        display: flex; align-items: center; gap: 20px;
        transition: padding 0.3s, background 0.3s, border-color 0.3s;
      }
      header.compact { padding: 10px 32px; }

      header h1 {
        font-family: 'DM Serif Display', serif;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        letter-spacing: -0.02em;
        color: var(--amber);
        transition: font-size 0.3s;
      }
      header.compact h1 { font-size: 1.3rem; }

      header .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--muted); display: inline-block;
        transition: background 0.3s, box-shadow 0.3s, width 0.3s, height 0.3s;
        flex-shrink: 0;
      }
      header.compact .dot { width: 6px; height: 6px; }
      header .dot.live {
        background: #e84040;
        box-shadow: 0 0 8px #e84040aa;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

      .header-right {
        margin-left: auto;
        display: flex; align-items: center; gap: 14px;
      }

      #jst-clock {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 1.0rem; letter-spacing: 0.08em;
        color: var(--header-clock-color);
        transition: font-size 0.3s, color 0.3s;
      }
      header.compact #jst-clock { font-size: 0.8rem; }
      #jst-clock .sec { opacity: 0.4; }

      #theme-btn {
        background: none; border: none; cursor: pointer;
        width: 28px; height: 28px;
        display: flex; align-items: center; justify-content: center;
        color: var(--muted);
        transition: color 0.2s;
        padding: 0; flex-shrink: 0;
      }
      #theme-btn:hover { color: var(--amber); }
      #theme-btn svg { width: 18px; height: 18px; }

      .filters { padding: 16px 32px 0; display: flex; gap: 8px; flex-wrap: wrap; }
      .filter-btn {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
        padding: 5px 14px; border-radius: 20px;
        border: 1px solid var(--border); background: transparent; color: var(--muted);
        cursor: pointer; transition: all 0.2s;
      }
      .filter-btn:hover { color: var(--text); border-color: var(--muted); }
      .filter-btn.active { background: var(--amber); color: var(--bg); border-color: var(--amber); font-weight: 500; }

      main {
        padding: 24px 32px calc(var(--player-h) + 24px);
        display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px; position: relative; z-index: 1;
      }

      .card {
        background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
        padding: 20px; cursor: pointer;
        transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s, background 0.3s;
        display: flex; flex-direction: column; gap: 10px;
        user-select: none; position: relative; overflow: hidden;
      }
      .card::after {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(circle at 70% 30%, var(--amber) 0%, transparent 65%);
        opacity: 0; transition: opacity 0.3s;
      }
      .card:hover { transform: translateY(-2px); border-color: var(--amber-dim); box-shadow: 0 8px 24px #0004; }
      .card:hover::after { opacity: 0.04; }
      .card.playing { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber-dim), 0 8px 32px #e8a83822; }
      .card.playing::after { opacity: 0.07; }
      .card.external .card-name { color: var(--blue); }
      .card.external .play-icon { border-color: var(--blue-dim); }
      .card.external:hover .play-icon { border-color: var(--blue); }
      .card.external .play-icon svg { fill: var(--blue); }
      .card.external:hover { border-color: var(--blue-dim); }

      .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
      .card-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; line-height: 1.2; color: var(--text); }
      .card.playing .card-name { color: var(--amber); }

      .play-icon {
        width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        transition: background 0.2s, border-color 0.2s;
      }
      .card:hover .play-icon { border-color: var(--amber); }
      .card.playing .play-icon { background: var(--amber); border-color: var(--amber); }
      .play-icon svg { width: 12px; height: 12px; fill: var(--muted); }
      .card:hover .play-icon svg { fill: var(--amber); }
      .card.playing .play-icon svg { fill: var(--bg); }

      .card-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
      .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

      .card-time {
        font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 0.06em;
        color: var(--muted); display: flex; align-items: center; gap: 5px;
        border-top: 1px solid var(--border); padding-top: 8px; margin-top: 2px;
      }
      .card-time .time-clock { color: var(--text); font-weight: 500; }

      .eq { display: flex; align-items: flex-end; gap: 2px; height: 14px; opacity: 0; transition: opacity 0.3s; }
      .card.playing .eq { opacity: 1; }
      .eq span { display: block; width: 3px; background: var(--amber); border-radius: 1px; animation: eq 0.8s ease-in-out infinite alternate; }
      .eq span:nth-child(1) { animation-duration: 0.6s; animation-delay: 0s; }
      .eq span:nth-child(2) { animation-duration: 0.8s; animation-delay: 0.15s; }
      .eq span:nth-child(3) { animation-duration: 0.5s; animation-delay: 0.05s; }
      .eq span:nth-child(4) { animation-duration: 0.9s; animation-delay: 0.2s; }
      .eq span:nth-child(5) { animation-duration: 0.7s; animation-delay: 0.1s; }
      @keyframes eq { from{height:3px} to{height:14px} }

      /* ── PLAYER BAR ── */
      #player-bar {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
        height: var(--player-h);
        background: var(--bg);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
        display: flex; align-items: center; padding: 0 24px; gap: 20px;
        transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), background 0.3s, border-color 0.3s;
      }
      #player-bar.visible { transform: translateY(0); }

      #player-name {
        font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--amber);
        flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      #player-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

      .ctrl-btn {
        width: 44px; height: 44px; border-radius: 50%;
        background: var(--surface); border: 1px solid var(--border); color: var(--text);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, border-color 0.2s; flex-shrink: 0;
      }
      .ctrl-btn:hover { border-color: var(--amber); }
      .ctrl-btn svg { width: 16px; height: 16px; fill: none; stroke: var(--text); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      #stop-btn { background: var(--amber); border-color: var(--amber); }
      #stop-btn svg { stroke: var(--bg); }
      #stop-btn-icon { fill: var(--bg); stroke: none; }

      /* タイマーボタン作動中 */
      #timer-btn.active { border-color: var(--amber); }
      #timer-btn.active svg { stroke: var(--amber); }

      /* タイマー残り時間表示 */
      #timer-remaining {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.65rem; letter-spacing: 0.06em;
        color: var(--amber);
        display: none;
        white-space: nowrap;
      }
      #timer-remaining.visible { display: block; }

      .vol-wrap { display: flex; align-items: center; gap: 8px; }
      .vol-wrap svg { width: 14px; height: 14px; fill: var(--muted); flex-shrink: 0; stroke: none; }
      #vol-slider {
        -webkit-appearance: none; width: 80px; height: 3px;
        background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
      }
      #vol-slider::-webkit-slider-thumb {
        -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--amber);
      }

      .section-label {
        grid-column: 1 / -1; font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
        padding-top: 8px; border-top: 1px solid var(--border); margin-top: 4px;
      }
      .section-label:first-child { border-top: none; margin-top: 0; }

      .empty {
        grid-column: 1 / -1; text-align: center; padding: 60px 0;
        color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; letter-spacing: 0.06em;
      }

      /* ── SLEEP TIMER POPUP ── */
      #timer-overlay {
        position: fixed; inset: 0; z-index: 100;
        background: #0008;
        display: flex; align-items: flex-end; justify-content: center;
        opacity: 0; pointer-events: none;
        transition: opacity 0.25s;
      }
      #timer-overlay.visible { opacity: 1; pointer-events: all; }

      #timer-popup {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px 20px 0 0;
        padding: 28px 24px 40px;
        width: 100%; max-width: 480px;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s, border-color 0.3s;
      }
      #timer-overlay.visible #timer-popup { transform: translateY(0); }

      #timer-popup h2 {
        font-family: 'DM Serif Display', serif;
        font-size: 1.2rem; color: var(--text);
        margin-bottom: 20px; text-align: center;
      }

      .timer-options {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        margin-bottom: 16px;
      }
      .timer-opt {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.85rem; font-weight: 500;
        padding: 14px 0; border-radius: 10px;
        border: 1px solid var(--border); background: var(--bg);
        color: var(--text); cursor: pointer;
        transition: all 0.2s; text-align: center;
      }
      .timer-opt:hover { border-color: var(--amber); color: var(--amber); }

      #timer-cancel {
        width: 100%; padding: 12px;
        font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
        letter-spacing: 0.08em; text-transform: uppercase;
        background: transparent; border: 1px solid var(--border);
        border-radius: 10px; color: var(--muted); cursor: pointer;
        transition: all 0.2s;
      }
      #timer-cancel:hover { border-color: var(--muted); color: var(--text); }

      @media (max-width: 600px) {
        header { padding: 16px 20px 14px; }
        header.compact { padding: 8px 20px; }
        .filters { padding: 12px 20px 0; }
        main { padding: 16px 20px calc(var(--player-h) + 16px); gap: 10px; }
        #player-bar { padding: 0 16px; gap: 10px; }
        .vol-wrap { display: none; }
        .timer-options { grid-template-columns: repeat(2, 1fr); }
      }
    </style>
  </head>
  <body>
    <header id="site-header">
      <h1>MyRadio</h1>
      <span class="dot" id="live-dot"></span>
      <div class="header-right">
        <button id="theme-btn" title="テーマ切替" aria-label="テーマ切替">
          <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
          </svg>
          <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <div id="jst-clock"></div>
      </div>
    </header>

    <div class="filters" id="filters"></div>
    <main id="grid"></main>

    <!-- PLAYER BAR -->
    <div id="player-bar">
      <div>
        <div id="player-name">—</div>
        <div id="player-tag">—</div>
      </div>
      <div style="flex:1"></div>
      <span id="timer-remaining"></span>
      <div class="vol-wrap">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="var(--muted)"/></svg>
        <input type="range" id="vol-slider" min="0" max="4" step="0.05" value="1.0" />
        <span id="vol-label" style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);min-width:2.8em">1.00</span>
      </div>
      <!-- タイマーボタン -->
      <button class="ctrl-btn" id="timer-btn" title="おやすみタイマー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <polyline points="12 7 12 12 15 15"/>
        </svg>
      </button>
      <!-- ストップボタン -->
      <button class="ctrl-btn" id="stop-btn" title="Stop">
        <svg viewBox="0 0 24 24"><rect id="stop-btn-icon" x="6" y="6" width="12" height="12" rx="1"/></svg>
      </button>
    </div>

    <!-- SLEEP TIMER OVERLAY -->
    <div id="timer-overlay">
      <div id="timer-popup">
        <h2>おやすみタイマー</h2>
        <div class="timer-options">
          <button class="timer-opt" data-min="15">15 min</button>
          <button class="timer-opt" data-min="30">30 min</button>
          <button class="timer-opt" data-min="60">60 min</button>
          <button class="timer-opt" data-min="90">90 min</button>
        </div>
        <button id="timer-cancel">キャンセル</button>
      </div>
    </div>

    <audio id="audio" preload="none" crossorigin="anonymous"></audio>

    <script>
      const audio         = document.getElementById('audio');
      const grid          = document.getElementById('grid');
      const filters       = document.getElementById('filters');
      const bar           = document.getElementById('player-bar');
      const pName         = document.getElementById('player-name');
      const pTag          = document.getElementById('player-tag');
      const liveDot       = document.getElementById('live-dot');
      const volSlider     = document.getElementById('vol-slider');
      const volLabel      = document.getElementById('vol-label');
      const stopBtn       = document.getElementById('stop-btn');
      const siteHeader    = document.getElementById('site-header');
      const themeBtn      = document.getElementById('theme-btn');
      const iconMoon      = document.getElementById('icon-moon');
      const iconSun       = document.getElementById('icon-sun');
      const timerBtn      = document.getElementById('timer-btn');
      const timerOverlay  = document.getElementById('timer-overlay');
      const timerCancel   = document.getElementById('timer-cancel');
      const timerRemaining= document.getElementById('timer-remaining');

      let STATIONS = [];
      let current = null;
      let activeFilter = 'All';
      let isLight = false;

      // ── SLEEP TIMER ──
      let sleepTimer = null;
      let sleepInterval = null;
      let sleepRemaining = 0; // 残り秒数

      function startSleepTimer(minutes) {
        clearSleepTimer();
        sleepRemaining = minutes * 60;
        updateTimerDisplay();
        timerBtn.classList.add('active');
        timerRemaining.classList.add('visible');

        sleepInterval = setInterval(() => {
          sleepRemaining--;
          updateTimerDisplay();
          if (sleepRemaining <= 0) {
            clearSleepTimer();
            stop();
          }
        }, 1000);

        closeTimerPopup();
      }

      function clearSleepTimer() {
        clearTimeout(sleepTimer);
        clearInterval(sleepInterval);
        sleepTimer = null;
        sleepInterval = null;
        sleepRemaining = 0;
        timerBtn.classList.remove('active');
        timerRemaining.classList.remove('visible');
        timerRemaining.textContent = '';
      }

      function updateTimerDisplay() {
        const min = Math.ceil(sleepRemaining / 60);
        timerRemaining.textContent = `${min} min`;
      }

      function openTimerPopup() {
        timerOverlay.classList.add('visible');
      }

      function closeTimerPopup() {
        timerOverlay.classList.remove('visible');
      }

      // タイマーボタン：作動中なら即キャンセル、未作動ならポップアップ
      timerBtn.addEventListener('click', () => {
        if (sleepInterval) {
          clearSleepTimer();
        } else {
          openTimerPopup();
        }
      });

      // オーバーレイ背景クリックで閉じる
      timerOverlay.addEventListener('click', (e) => {
        if (e.target === timerOverlay) closeTimerPopup();
      });

      timerCancel.addEventListener('click', closeTimerPopup);

      // 時間選択ボタン
      document.querySelectorAll('.timer-opt').forEach(btn => {
        btn.addEventListener('click', () => {
          startSleepTimer(parseInt(btn.dataset.min));
        });
      });

      // ── THEME TOGGLE ──
      themeBtn.addEventListener('click', () => {
        isLight = !isLight;
        document.documentElement.classList.toggle('light', isLight);
        iconMoon.style.display = isLight ? 'none' : 'block';
        iconSun.style.display  = isLight ? 'block' : 'none';
      });

      // ── HEADER COMPACT ON SCROLL ──
      window.addEventListener('scroll', () => {
        if (window.scrollY > 40) {
          siteHeader.classList.add('compact');
          siteHeader.style.position = 'fixed';
          siteHeader.style.width = '100%';
          document.body.style.paddingTop = siteHeader.offsetHeight + 'px';
        } else {
          siteHeader.classList.remove('compact');
          siteHeader.style.position = 'sticky';
          siteHeader.style.width = '';
          document.body.style.paddingTop = '';
        }
      }, { passive: true });

      // ── WEB AUDIO API ──
      let audioCtx = null;
      let gainNode = null;
      let audioInitialized = false;

      function initAudioContext() {
        if (audioInitialized) return;
        audioInitialized = true;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audio);
        gainNode = audioCtx.createGain();
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
      }

      function applyVolume(v) {
        if (!audioCtx) { audio.volume = Math.min(v, 1.0); return; }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (v <= 1.0) { audio.volume = v; gainNode.gain.value = 1.0; }
        else { audio.volume = 1.0; gainNode.gain.value = v; }
      }

      volSlider.addEventListener('input', () => {
        const v = parseFloat(volSlider.value);
        volLabel.textContent = v.toFixed(2);
        applyVolume(v);
      });

      // ── JST CLOCK ──
      function updateJST() {
        const now = new Date();
        const hm = new Intl.DateTimeFormat('ja-JP', {
          timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', hour12: false,
        }).format(now);
        const ss = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('jst-clock').innerHTML = `${hm}<span class="sec">:${ss}</span>`;
      }
      updateJST();
      setInterval(updateJST, 1000);

      // ── LOCAL TIME ──
      function getLocalTime(timezone) {
        try {
          return new Intl.DateTimeFormat('ja-JP', {
            timeZone: timezone, hour: '2-digit', minute: '2-digit', hour12: false,
          }).format(new Date());
        } catch { return '--:--'; }
      }

      function updateClocks() {
        document.querySelectorAll('[data-timezone]').forEach((el) => {
          el.textContent = getLocalTime(el.dataset.timezone);
        });
      }
      setInterval(updateClocks, 30000);

      // ── FILTERS ──
      function buildFilters() {
        const cats = ['All', ...new Set(STATIONS.map((s) => s.category))];
        filters.innerHTML = '';
        cats.forEach((cat) => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (cat === activeFilter ? ' active' : '');
          btn.textContent = cat;
          btn.onclick = () => { activeFilter = cat; buildFilters(); buildGrid(); };
          filters.appendChild(btn);
        });
      }

      // ── GRID ──
      function buildGrid() {
        grid.innerHTML = '';
        const visible = activeFilter === 'All'
          ? STATIONS
          : STATIONS.filter((s) => s.category === activeFilter);

        if (!visible.length) {
          grid.innerHTML = '<div class="empty">no stations in this category</div>';
          return;
        }

        const groups = {};
        visible.forEach((s) => {
          if (!groups[s.category]) groups[s.category] = [];
          groups[s.category].push(s);
        });

        Object.entries(groups).forEach(([cat, stations]) => {
          if (activeFilter === 'All') {
            const label = document.createElement('div');
            label.className = 'section-label';
            label.textContent = cat;
            grid.appendChild(label);
          }
          stations.forEach((s) => grid.appendChild(makeCard(s)));
        });
      }

      // ── CARD ──
      function makeCard(station) {
        const isExternal = !!station.website;
        const card = document.createElement('div');
        card.className = 'card' + (current === station ? ' playing' : '') + (isExternal ? ' external' : '');
        const iconPath = isExternal
          ? 'M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z'
          : current === station ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z' : 'M8 5v14l11-7z';

        const timeHtml = station.timezone ? `
          <div class="card-time">
            <svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor" style="opacity:.5;flex-shrink:0">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
            </svg>
            <span class="time-clock" data-timezone="${station.timezone}">${getLocalTime(station.timezone)}</span>
            <span style="opacity:.45">${station.timezone.split('/')[1]?.replace('_', ' ') ?? station.timezone}</span>
          </div>` : '';

        card.innerHTML = `
          <div class="card-top">
            <div class="card-name">${station.name}</div>
            <div class="play-icon">
              <svg viewBox="0 0 24 24"><path d="${iconPath}"/></svg>
            </div>
          </div>
          <div class="card-tag">${station.category}</div>
          ${station.desc ? `<div class="card-desc">${station.desc}</div>` : ''}
          ${timeHtml}
          <div class="eq"><span></span><span></span><span></span><span></span><span></span></div>
        `;
        card.addEventListener('click', () => play(station));
        return card;
      }

      // ── PLAY ──
      function play(station) {
        if (station.website) { window.open(station.website, '_blank'); return; }
        if (current === station) { stop(); return; }
        initAudioContext();
        current = station;
        audio.src = station.url;
        const v = station.volume ?? 1.0;
        volSlider.value = v;
        volLabel.textContent = v.toFixed(2);
        applyVolume(v);
        audio.play().catch((e) => console.warn('play error:', e));
        pName.textContent = station.name;
        pTag.textContent = station.category;
        bar.classList.add('visible');
        liveDot.classList.add('live');
        buildGrid();
      }

      // ── STOP ──
      function stop() {
        audio.pause();
        audio.src = '';
        current = null;
        bar.classList.remove('visible');
        liveDot.classList.remove('live');
        clearSleepTimer();
        buildGrid();
      }

      stopBtn.addEventListener('click', stop);

      // ── LOAD STATIONS ──
      fetch('./stations.json')
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(data => { STATIONS = data; buildFilters(); buildGrid(); })
        .catch(err => {
          console.error('stations.json の読み込み失敗:', err);
          document.getElementById('grid').innerHTML =
            '<div class="empty">stations.json の読み込みに失敗しました: ' + err.message + '</div>';
        });
    </script>
  </body>
</html>
